font=JetBrains Mono:size=11
prompt="& "
icons-enabled=yes

# Window layout and appearance
anchor=center
lines=10
width=40
horizontal-pad=30
vertical-pad=20
inner-pad=5

[border]
width=5
radius=0

[colors]
background=FCFCFCff
text=5C6166ff
match=eba54dff
selection=e6e6e6ff
selection-text=5C6166ff
selection-match=eba54dff
border=eba54dff

[key-bindings]
cancel=Escape Control+g
execute=Return KP_Enter
prev=Up Control+p
next=Down Control+n
