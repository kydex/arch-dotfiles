font=JetBrains Mono:size=11
prompt="& "
icons-enabled=yes

# Window layout and appearance
anchor=center
lines=10
width=40
horizontal-pad=30
vertical-pad=20
inner-pad=5

[border]
width=5
radius=0

[colors]
background=1f2430ff
text=cbccc6ff
match=fdcc60ff
selection=242936ff
selection-text=cbccc6ff
selection-match=fdcc60ff
border=fdcc60ff

[key-bindings]
cancel=Escape Control+g
execute=Return KP_Enter
prev=Up Control+p
next=Down Control+n
